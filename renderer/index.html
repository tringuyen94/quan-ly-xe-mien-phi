<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản Lý Xe — Chợ Thủ Đức</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>Quản Lý Xe — Chợ Thủ Đức</h1>
    <div class="header-right">
      <div class="connection-status" id="connStatus">Đang kết nối...</div>
      <button class="theme-toggle" id="themeToggle" title="Chuyển giao diện sáng/tối">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364-.707-.707M6.343 6.343l-.707-.707m12.728 0-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" />
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab active" data-table="tblXeMienPhi">Xe Miễn Phí</button>
  </nav>

  <!-- Main content -->
  <div class="main">
    <!-- Sidebar: owners list -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Chủ xe</h3>
        <input type="text" id="ownerSearch" placeholder="Tìm chủ xe..." />
      </div>
      <ul id="ownerList" class="owner-list"></ul>
    </aside>

    <!-- Content: vehicle table -->
    <section class="content">
      <div class="content-header">
        <h3 id="contentTitle">Chọn chủ xe để xem danh sách</h3>
        <button class="btn btn-outline" id="btnSelectAll" style="display:none">Chọn tất cả</button>
      </div>
      <div class="actions-bar" id="actionsBar" style="display:none">
        <div class="action-panel" id="panelExpiry">
          <div class="action-panel-label">Gia hạn</div>
          <div class="action-panel-controls" id="expiryGroup"></div>
          <button class="btn btn-primary" id="btnUpdate">Cập nhật</button>
        </div>
        <div class="action-panel action-panel-status" id="panelStatus" style="display:none">
          <div class="action-panel-label">Trạng thái</div>
          <div class="action-panel-controls" id="statusGroup"></div>
          <button class="btn btn-status" id="btnUpdateStatus">Cập nhật TT</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="vehicleTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
            </svg>
          </div>
          <p>Chọn chủ xe ở cột bên trái để xem danh sách xe</p>
          <span class="empty-hint">Bạn có thể tìm kiếm theo tên chủ xe</span>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
